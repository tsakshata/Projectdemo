<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Student Registration Form</h1>
        <p class="subtitle">Welcome to the Student Portal</p>

        <form id="studentForm">

            <div class="form-group">
                <label>Student Name</label>
                <input type="text" id="name" placeholder="Enter Student Name">
                <small id="nameError" style="color:red"></small>
                <small id="charCount" style="color:gray"></small>
            </div>

            <div class="form-group">
                <label>Student ID</label>
                <input type="text" id="studentId" placeholder="Enter Student ID">
                <small id="idError" style="color:rgb(104, 30, 30)"></small>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter Email Address">
                <small id="emailError" style="color:rgb(120, 48, 105)"></small>
            </div>

            <div class="form-group">
                <label>Select Course</label>
                <select id="course">
                    <option value="">-- Select Course --</option>
                    <option>BCA</option>
                    <option>BSc</option>
                    <option>BCom</option>
                    <option>MCA</option>
                    <option>BTech</option>
                </select>
                <small id="courseError" style="color:red"></small>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="Enter Phone Number" maxlength="10">
                <small id="phoneError" style="color:red"></small>
            </div>

            <button type="submit">Register</button>
            <button type="button" id="clearBtn">Clear Form</button>

            <p id="successMessage"></p>

        </form>

    </div>

    <script src="script.js"></script>

</body>

</html>
